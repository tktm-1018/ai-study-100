<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI知識 1から100 — ゼロから学ぶAI完全ガイド</title>
<style>
  :root {
    --bg: #f7f8fa;
    --card: #ffffff;
    --text: #1a202c;
    --muted: #64748b;
    --accent: #4f46e5;
    --accent-light: #eef2ff;
    --border: #e2e8f0;
    --done: #10b981;
    --done-bg: #ecfdf5;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #818cf8;
      --accent-light: #312e81;
      --border: #334155;
      --done: #34d399;
      --done-bg: #064e3b;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.8;
  }
  header {
    background: linear-gradient(135deg, #4f46e5, #7c3aed, #db2777);
    color: #fff;
    padding: 48px 24px 40px;
    text-align: center;
  }
  header h1 { font-size: 2rem; margin-bottom: 8px; }
  header p { opacity: 0.9; max-width: 640px; margin: 0 auto; }
  .progress-wrap {
    max-width: 640px;
    margin: 24px auto 0;
    background: rgba(255,255,255,0.25);
    border-radius: 999px;
    height: 14px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: #fff;
    border-radius: 999px;
    width: 0%;
    transition: width 0.4s ease;
  }
  .progress-label { margin-top: 8px; font-size: 0.9rem; opacity: 0.95; }

  .container {
    display: flex;
    max-width: 1200px;
    margin: 0 auto;
    gap: 24px;
    padding: 24px;
  }
  nav.toc {
    width: 240px;
    flex-shrink: 0;
    position: sticky;
    top: 16px;
    align-self: flex-start;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    max-height: calc(100vh - 32px);
    overflow-y: auto;
  }
  nav.toc h2 { font-size: 0.95rem; color: var(--muted); margin-bottom: 8px; }
  nav.toc a {
    display: block;
    padding: 6px 10px;
    border-radius: 8px;
    color: var(--text);
    text-decoration: none;
    font-size: 0.88rem;
    margin-bottom: 2px;
  }
  nav.toc a:hover { background: var(--accent-light); }
  nav.toc .toc-count { color: var(--muted); font-size: 0.75rem; }

  main { flex: 1; min-width: 0; }
  .search-box {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 1rem;
    background: var(--card);
    color: var(--text);
    margin-bottom: 24px;
  }
  .search-box:focus { outline: 2px solid var(--accent); border-color: transparent; }

  section.chapter { margin-bottom: 40px; }
  .chapter-head {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 4px;
    padding-top: 8px;
  }
  .chapter-head h2 { font-size: 1.4rem; }
  .chapter-range {
    font-size: 0.8rem;
    color: var(--accent);
    background: var(--accent-light);
    padding: 2px 10px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .chapter-desc { color: var(--muted); font-size: 0.92rem; margin-bottom: 16px; }

  .topic {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .topic.done { background: var(--done-bg); border-color: var(--done); }
  .topic-head {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    cursor: pointer;
  }
  .topic-num {
    flex-shrink: 0;
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: var(--accent-light);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.95rem;
  }
  .topic.done .topic-num { background: var(--done); color: #fff; }
  .topic-title { font-size: 1.05rem; font-weight: 700; flex: 1; padding-top: 5px; }
  .topic-check {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    margin-top: 7px;
    accent-color: var(--done);
    cursor: pointer;
  }
  .topic-body { margin-top: 10px; color: var(--text); font-size: 0.95rem; padding-left: 50px; }
  .topic-body .keyword { color: var(--accent); font-weight: 700; }
  @media (max-width: 800px) {
    .container { flex-direction: column; }
    nav.toc { width: 100%; position: static; max-height: none; }
    .topic-body { padding-left: 0; }
  }
  footer {
    text-align: center;
    color: var(--muted);
    padding: 32px;
    font-size: 0.85rem;
  }
  .reset-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 16px;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 8px;
  }
  .reset-btn:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<header>
  <h1>🧠 AI知識 1から100</h1>
  <p>人工知能の基礎から最先端まで、100のトピックで体系的に学べる完全ガイド。読み終えた項目にチェックを入れて、自分のペースで進めましょう。</p>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
  <div class="progress-label" id="progressLabel">0 / 100 完了</div>
</header>

<div class="container">
  <nav class="toc" id="toc">
    <h2>目次</h2>
  </nav>
  <main>
    <input type="search" class="search-box" id="searchBox" placeholder="🔍 キーワードで検索（例：Transformer、過学習、RAG）">
    <div id="content"></div>
  </main>
</div>

<footer>
  <p>AI知識 1から100 — 学習進捗はこのブラウザに自動保存されます。</p>
  <button class="reset-btn" id="resetBtn">進捗をリセット</button>
</footer>

<script>
const CHAPTERS = [
  {
    title: "第1章 AIの基礎",
    desc: "そもそもAIとは何か。歴史と基本概念を押さえて、学習の土台を作ります。",
    topics: [
      ["AI（人工知能）とは何か", "AI（Artificial Intelligence）とは、人間の知的な活動——認識・推論・学習・判断など——をコンピュータで実現する技術の総称です。明確な単一の定義はなく、「人間のように考える機械」から「特定のタスクを賢くこなすプログラム」まで幅広い意味で使われます。現在私たちが日常で触れるAIのほとんどは、特定の目的に特化したものです。"],
      ["AIの歴史 — ブームと冬の時代", "AIという言葉は1956年のダートマス会議で生まれました。その後、探索と推論の第1次ブーム（1950〜60年代）、エキスパートシステムの第2次ブーム（1980年代）、機械学習・ディープラーニングによる第3次ブーム（2010年代〜）と、期待と失望（AIの冬）を繰り返しながら発展してきました。2022年のChatGPT登場以降は生成AIブームと呼ばれる新たな段階に入っています。"],
      ["強いAIと弱いAI", "「強いAI（汎用人工知能）」は人間と同等の汎用的な知能を持つAIを指し、まだ実現していません。一方「弱いAI（特化型AI）」は画像認識や翻訳など特定のタスクに特化したAIで、現在実用化されているAIはすべてこちらです。ChatGPTのような高性能なAIも、分類上は弱いAIに含まれます。"],
      ["AI・機械学習・ディープラーニングの関係", "この3つは入れ子の関係にあります。AIという大きな概念の中に、データから自動的にパターンを学ぶ「機械学習」があり、さらにその中に、人間の脳を模したニューラルネットワークを多層に重ねる「ディープラーニング」があります。近年のAIの躍進は、主にディープラーニングの進歩によるものです。"],
      ["ルールベースと学習ベース", "初期のAIは「もしAならBせよ」というルールを人間が書き込むルールベース方式でした。しかし現実世界の複雑さをすべてルール化するのは不可能でした。現代のAIは、大量のデータから機械自身がパターンを見つけ出す学習ベース方式が主流です。この転換がAIの実用化を一気に進めました。"],
      ["データの重要性", "学習ベースのAIにとって、データは燃料のような存在です。「Garbage In, Garbage Out（ゴミを入れればゴミが出る）」という言葉の通り、データの量と質がAIの性能を大きく左右します。ビッグデータの蓄積とインターネットの普及が、第3次AIブームを支える基盤となりました。"],
      ["アルゴリズムとは", "アルゴリズムとは、問題を解くための手順を明確に定義したものです。料理のレシピに例えられることが多く、入力（材料）に対して決まった手順で処理を行い、出力（料理）を得ます。機械学習のアルゴリズムは「データからどうやってパターンを学ぶか」の手順を定めたものです。"],
      ["チューリングテスト", "数学者アラン・チューリングが1950年に提案した、機械が知的かどうかを判定するテストです。審査員が文字での対話を通じて、相手が人間か機械かを見分けられなければ、その機械は知的とみなされます。現代のチャットAIはこのテストに事実上合格するレベルに達しており、「知能とは何か」の議論が改めて活発になっています。"],
      ["身の回りのAI活用例", "AIはすでに生活のあらゆる場面に入り込んでいます。スマホの顔認証、音声アシスタント、ECサイトのおすすめ商品、迷惑メールフィルタ、カーナビの渋滞予測、翻訳アプリなど、意識せずに使っているものが多数あります。「AI＝特別なもの」ではなく、すでに社会インフラの一部です。"],
      ["AIにできること・できないこと", "現在のAIはパターン認識・予測・生成が得意ですが、万能ではありません。学習データにない状況への対応、物理世界での柔軟な行動、真の意味での理解や意識、責任を伴う最終判断などは苦手または不可能です。AIの限界を知ることは、AIを正しく活用するための第一歩です。"]
    ]
  },
  {
    title: "第2章 機械学習の基礎",
    desc: "AIの中核技術である機械学習。その仕組みと基本用語を理解します。",
    topics: [
      ["機械学習とは", "機械学習（Machine Learning）とは、明示的にプログラムしなくても、データから自動的にパターンや規則性を学習する技術です。例えば猫の写真を大量に見せることで、「猫らしさ」の特徴を機械自身が獲得します。学習の方式によって、教師あり学習・教師なし学習・強化学習の3つに大別されます。"],
      ["教師あり学習", "入力データと正解ラベルのペアを使って学習する方式です。「この画像は猫」「このメールは迷惑メール」といった正解付きデータから、入力と出力の関係を学びます。画像分類、価格予測、需要予測など、実務で最も広く使われている学習方式です。"],
      ["教師なし学習", "正解ラベルのないデータから、データ自体の構造やパターンを見つけ出す方式です。代表例は、似たデータをグループ分けする「クラスタリング」や、データの本質的な特徴を抽出する「次元削減」です。顧客のセグメント分析や異常検知などに活用されます。"],
      ["強化学習", "エージェント（行動主体）が環境の中で試行錯誤し、報酬を最大化する行動を学ぶ方式です。良い行動には報酬、悪い行動にはペナルティを与えることで、最適な戦略を獲得します。囲碁AIのAlphaGoやロボット制御、ゲームAIなどで威力を発揮しました。"],
      ["回帰と分類", "教師あり学習のタスクは大きく2つに分かれます。「回帰」は数値を予測するタスクで、明日の気温や住宅価格の予測などが該当します。「分類」はカテゴリを予測するタスクで、画像が猫か犬か、メールが迷惑メールか否か、といった判定が該当します。解きたい問題がどちらかを見極めることが、モデル選びの出発点です。"],
      ["訓練データとテストデータ", "機械学習では、手持ちのデータを「訓練データ」と「テストデータ」に分けます。訓練データでモデルを学習させ、学習に使っていないテストデータで実力を測ります。学校の勉強に例えると、訓練データは練習問題、テストデータは本番の試験です。この分離を怠ると、モデルの本当の性能がわかりません。"],
      ["過学習（オーバーフィッティング）", "訓練データに過剰に適合しすぎて、新しいデータへの対応力（汎化性能）を失う現象です。練習問題の答えを丸暗記して応用が利かない状態に似ています。データを増やす、モデルを単純にする、正則化やドロップアウトといった手法で抑制します。機械学習で最も注意すべき落とし穴の一つです。"],
      ["特徴量とは", "特徴量（Feature）とは、予測の手がかりとしてモデルに与えるデータの属性のことです。住宅価格の予測なら、広さ・築年数・駅からの距離などが特徴量になります。従来は人間が特徴量を設計する「特徴量エンジニアリング」が重要でしたが、ディープラーニングは特徴量を自動で獲得できる点が画期的でした。"],
      ["代表的なアルゴリズム", "機械学習には多様なアルゴリズムがあります。条件分岐の木で判断する「決定木」とその発展形の「ランダムフォレスト」「勾配ブースティング」、境界線でデータを分ける「SVM（サポートベクターマシン）」、近くのデータ点から多数決する「k近傍法（k-NN）」などが代表的です。表形式データでは今もこれらが現役で活躍しています。"],
      ["モデルの評価指標", "モデルの良し悪しは複数の指標で測ります。「正解率（Accuracy）」は全体のうち正しく予測できた割合、「適合率（Precision）」は陽性と予測した中の正解率、「再現率（Recall）」は実際の陽性をどれだけ拾えたか、「F値」は適合率と再現率のバランスです。例えば病気の検査では見逃しを減らす再現率が重視されるなど、目的に応じた指標選びが重要です。"]
    ]
  },
  {
    title: "第3章 ディープラーニング",
    desc: "第3次AIブームの主役。ニューラルネットワークの仕組みを学びます。",
    topics: [
      ["ニューラルネットワークとは", "人間の脳の神経回路網をヒントにした数理モデルです。「入力層」「隠れ層」「出力層」というニューロン（ノード）の層で構成され、各ニューロン間の結合の強さ（重み）を調整することで学習します。隠れ層を深く（ディープに）重ねたものがディープラーニングです。"],
      ["パーセプトロンとニューロン", "パーセプトロンは1957年に考案された最も基本的な人工ニューロンで、複数の入力に重みを掛けて足し合わせ、しきい値を超えたら発火（出力）します。単体では単純な判定しかできませんが、これを大量に組み合わせて層にすることで、極めて複雑なパターンを表現できるようになります。"],
      ["活性化関数", "ニューロンの出力を変換する関数で、ネットワークに「非線形性」を与える重要な役割を持ちます。非線形性がないと、層をいくら重ねても単純な計算しかできません。代表的なものにReLU（ランプ関数）、シグモイド関数、tanhがあり、現代のディープラーニングではReLU系が主流です。"],
      ["誤差逆伝播法（バックプロパゲーション）", "ニューラルネットワークの学習を支える中核アルゴリズムです。モデルの予測と正解の誤差を計算し、その誤差を出力層から入力層へ逆向きに伝えながら、各重みを「誤差が小さくなる方向」に少しずつ修正します。この仕組みにより、何億ものパラメータを持つ巨大なネットワークでも効率的に学習できます。"],
      ["勾配降下法", "誤差（損失）を最小にするパラメータを探す最適化手法です。誤差関数を山の地形に例えると、現在地から最も急な下り坂の方向に少しずつ降りていくイメージです。一歩の大きさを決める「学習率」の設定が重要で、大きすぎると谷を飛び越え、小さすぎると学習が進みません。実務ではAdamなどの改良版がよく使われます。"],
      ["CNN（畳み込みニューラルネットワーク）", "画像処理に特化したネットワーク構造です。「畳み込み層」が画像の局所的な特徴（エッジや模様）を検出し、層を重ねるごとに目・顔・人物といったより抽象的な特徴を捉えていきます。画像認識・物体検出・医療画像診断など、コンピュータビジョン分野の発展を牽引しました。"],
      ["RNNとLSTM", "RNN（再帰型ニューラルネットワーク）は、文章や時系列のような順序のあるデータを扱うために、過去の情報を記憶しながら処理するネットワークです。長い系列で記憶が薄れる弱点を改良したのがLSTMです。Transformerの登場で主役の座は譲りましたが、系列データ処理の発展に大きく貢献しました。"],
      ["GPUとAIの計算", "ディープラーニングの学習は膨大な行列計算の繰り返しで、これを並列処理が得意なGPU（画像処理装置）が劇的に高速化しました。もともとゲーム用だったGPUがAIの必須インフラとなり、NVIDIA社が市場を席巻しています。近年はAI専用チップ（TPUなど）の開発も活発です。"],
      ["ImageNetとAlexNetの衝撃", "2012年、画像認識コンテスト「ILSVRC」でディープラーニングを使ったAlexNetが従来手法に圧倒的な大差で優勝しました。この出来事が第3次AIブームの号砲となり、世界中の研究と投資がディープラーニングに集中しました。大規模データセット（ImageNet）と GPU の組み合わせが勝因で、以降「データ×計算力」がAI発展の方程式となります。"],
      ["ハイパーパラメータ", "学習率、層の数、ニューロンの数、バッチサイズなど、学習を始める前に人間が設定する値をハイパーパラメータと呼びます。モデルが自動で学ぶパラメータ（重み）とは区別されます。この設定次第で性能が大きく変わるため、グリッドサーチやベイズ最適化などの探索手法で最適な組み合わせを見つけます。"]
    ]
  },
  {
    title: "第4章 自然言語処理とLLM",
    desc: "言葉を扱うAIの仕組み。ChatGPTやClaudeを支える技術の核心に迫ります。",
    topics: [
      ["自然言語処理（NLP）とは", "人間が日常的に使う言葉（自然言語）をコンピュータで処理する技術分野です。翻訳、要約、感情分析、質問応答、文章生成など幅広いタスクを含みます。言葉は曖昧で文脈に依存するため長年難問とされてきましたが、大規模言語モデルの登場で精度が飛躍的に向上しました。"],
      ["トークンとトークナイザー", "言語モデルは文章を「トークン」という単位に分割して処理します。トークンは単語より細かいことが多く、日本語では1文字〜数文字、英語では単語の一部や単語全体が1トークンになります。この分割を行うのがトークナイザーです。LLMの料金や入力上限が「トークン数」で表されるのはこのためです。"],
      ["単語の埋め込み（Embedding）", "言葉を数百〜数千次元の数値ベクトルに変換する技術です。意味の近い言葉はベクトル空間上で近くに配置され、「王様 − 男 + 女 ≈ 女王」のような意味の計算もできます。Word2Vec（2013年）がこの概念を広め、現在は文章全体のEmbeddingが検索やRAGの基盤技術になっています。"],
      ["Attention機構", "文中のどの単語に注目すべきかを動的に計算する仕組みです。例えば「銀行の口座」と「川の銀行（土手）」では、周囲の単語への注目によって「銀行」の意味を適切に解釈できます。「Attention Is All You Need」という2017年の論文タイトルが示す通り、この機構が現代のLLMの心臓部です。"],
      ["Transformer", "2017年にGoogleが発表した、Attention機構を中心に据えたネットワーク構造です。RNNと違って文章全体を並列に処理できるため、GPUでの大規模学習に適していました。GPT、Claude、Geminiなど現代のLLMはすべてTransformerをベースにしており、画像や音声の分野にも応用が広がっています。"],
      ["事前学習とファインチューニング", "LLMの訓練は2段階で行われます。まず「事前学習」でインターネット規模の膨大なテキストから言語の一般知識を学び、次に「ファインチューニング」で特定のタスクや望ましい応答スタイルに調整します。この「大規模に学んでから専門化する」方式が、汎用性と実用性を両立させました。"],
      ["大規模言語モデル（LLM）とは", "数十億〜数兆のパラメータを持ち、膨大なテキストで訓練された言語モデルです。次に来るトークンを予測するというシンプルな訓練だけで、翻訳・要約・推論・プログラミングなど多様な能力を獲得します。規模の拡大によって質的に新しい能力が出現する「創発」が大きな特徴です。"],
      ["スケーリング則", "モデルのパラメータ数・データ量・計算量を増やすほど、性能が予測可能な形で向上するという経験則です。2020年にOpenAIが論文で示し、「とにかく大きくすれば賢くなる」という開発競争の根拠となりました。近年は学習時だけでなく、推論時に考える時間を増やすことで性能を上げる新しいスケーリングも注目されています。"],
      ["RLHF（人間のフィードバックによる強化学習）", "人間が「どちらの回答が良いか」を評価したデータを使って、モデルを人間の好みに合わせて調整する手法です。事前学習だけのモデルは有害な内容や的外れな回答も生成しますが、RLHFによって「役に立ち、正直で、無害な」応答へと近づけます。ChatGPTの使いやすさを支えた立役者です。"],
      ["代表的なLLM", "主要なLLMには、OpenAIのGPTシリーズ、AnthropicのClaude、GoogleのGemini、MetaのLlama（オープンモデル）、その他Mistral、DeepSeekなどがあります。それぞれ得意分野・料金・利用形態（APIのみ／重み公開）が異なります。モデルの性能差は急速に変化するため、ベンチマークだけでなく実際の用途で比較することが大切です。"]
    ]
  },
  {
    title: "第5章 生成AI",
    desc: "文章・画像・音声・動画を生み出すAI。その仕組みと特性、注意点を学びます。",
    topics: [
      ["生成AIとは", "従来のAIが「認識・分類・予測」を主としていたのに対し、生成AI（Generative AI）は文章・画像・音声・動画などのコンテンツを新たに作り出すAIです。2022年のStable DiffusionとChatGPTの登場で一気に普及し、創作・業務・教育のあり方を変えつつあります。"],
      ["テキスト生成の仕組み（次トークン予測）", "LLMの文章生成は「次に来る確率が高いトークンを予測して1つずつ出力する」ことの繰り返しです。「今日の天気は」の次は「晴れ」の確率が高い、という具合です。この単純な仕組みから、推論や創作のような高度な振る舞いが生まれることが、LLMの最も驚くべき点です。"],
      ["画像生成AI（拡散モデル）", "Stable DiffusionやMidjourney、DALL-Eなどの画像生成AIは「拡散モデル」という技術を使っています。画像にノイズを加えていく過程を逆向きに学習し、純粋なノイズから少しずつ画像を復元していきます。テキストの指示（プロンプト）で生成内容を制御でき、デザインや広告の現場で実用化が進んでいます。"],
      ["音声合成・音声認識", "音声認識（Speech-to-Text）はWhisperなどのモデルにより、雑音下や多言語でも高精度になりました。音声合成（Text-to-Speech）は人間と区別が難しい自然な音声を生成でき、数秒のサンプルから特定の声を再現する技術もあります。便利な反面、ボイスクローン詐欺などの悪用リスクも生じています。"],
      ["動画生成AI", "テキストから動画を生成する技術で、OpenAIのSoraやGoogleのVeoなどが代表例です。物理法則や時間的な一貫性の維持が難しく、画像生成より技術的ハードルが高い分野ですが、急速に品質が向上しています。映像制作のコストを劇的に下げる可能性がある一方、フェイク動画への懸念も高まっています。"],
      ["マルチモーダルAI", "テキスト・画像・音声・動画など複数の種類（モダリティ）の情報をまとめて扱えるAIです。画像を見せて質問したり、グラフを読み取らせたり、音声で対話したりできます。GPT-4以降の主要モデルはマルチモーダル対応が標準となり、人間に近い形で世界を「見て聞いて」理解する方向に進化しています。"],
      ["ハルシネーション（幻覚）", "AIが事実と異なる内容を、もっともらしく自信満々に生成してしまう現象です。LLMは「正しい知識」ではなく「もっともらしい続き」を生成する仕組みのため、原理的に避けられません。存在しない論文や判例の引用などが実際に問題化しています。重要な情報は必ず一次情報で検証する習慣が不可欠です。"],
      ["コンテキストウィンドウ", "LLMが一度に処理できるテキスト量の上限で、トークン数で表されます。会話履歴や読み込ませた資料はすべてこの枠内に収まる必要があります。近年は数十万〜数百万トークンの長大なコンテキストを持つモデルが登場し、書籍一冊やコードベース全体を読み込ませることも可能になりました。"],
      ["生成パラメータ（Temperatureなど）", "LLMの出力の性質は生成時のパラメータで調整できます。代表的な「Temperature（温度）」は出力のランダム性を制御し、低くすると確実で一貫した回答に、高くすると多様で創造的な回答になります。事実回答には低め、ブレインストーミングには高め、といった使い分けができます。"],
      ["生成AIと著作権", "生成AIをめぐる法的議論は世界中で進行中です。日本では学習段階でのデータ利用は原則適法とされる一方、生成物が既存著作物に類似していれば著作権侵害になり得ます。AIの生成物自体の著作権の扱いも国によって異なります。商用利用の際は利用するサービスの規約と最新の法動向の確認が必須です。"]
    ]
  },
  {
    title: "第6章 AI活用の実践スキル",
    desc: "AIを使いこなすための技術。プロンプトからエージェントまで、実用スキルを身につけます。",
    topics: [
      ["プロンプトエンジニアリングとは", "AIから望む出力を引き出すために、指示文（プロンプト）を設計する技術です。同じ質問でも書き方次第で回答の質が大きく変わります。モデルの性能向上により細かいテクニックの重要性は下がりつつありますが、「明確に意図を伝える」という本質はAI活用の基礎スキルであり続けています。"],
      ["良いプロンプトの書き方", "効果的なプロンプトの基本は、①目的と背景を伝える、②役割や対象読者を指定する、③出力形式を具体的に示す、④制約条件を明記する、⑤例を示す、の5点です。「新人に仕事を依頼するつもりで、必要な情報をすべて渡す」という意識を持つと、AIの出力品質は大きく向上します。"],
      ["Few-shotプロンプティング", "プロンプトの中にいくつかの例（お手本）を含める手法です。例を示さない「Zero-shot」に対し、入出力のペアを2〜3個示す「Few-shot」では、形式や粒度をAIが正確に汲み取れるようになります。分類タスクや独自フォーマットでの出力など、言葉で説明しにくい要件に特に有効です。"],
      ["Chain of Thought（思考の連鎖）", "「ステップバイステップで考えて」と指示し、結論の前に推論過程を出力させる手法です。途中の思考を言語化させることで、計算や論理問題の正答率が大きく向上することが知られています。この発想を発展させ、モデル内部で長い思考を行う「推論モデル」が生まれました。"],
      ["ロール指定とシステムプロンプト", "「あなたはベテランの編集者です」のように役割を与えると、その視点に沿った回答が得られます。API利用時には「システムプロンプト」としてAIの人格・口調・制約を会話全体に設定できます。企業のAIチャットボットの個性や安全ガードレールは、主にシステムプロンプトで作られています。"],
      ["RAG（検索拡張生成）", "Retrieval-Augmented Generationの略で、質問に関連する文書を検索して取得し、それをプロンプトに含めてAIに回答させる仕組みです。社内文書や最新情報など、モデルが学習していない知識に基づいた回答が可能になり、ハルシネーションの抑制にも効果があります。企業のAI活用で最も普及しているアーキテクチャの一つです。"],
      ["AIエージェントとは", "単に質問に答えるだけでなく、目標を与えると自律的に計画を立て、ツールを使い、結果を確認しながらタスクを遂行するAIシステムです。調査レポートの作成、コードの実装、ブラウザ操作などを人間の細かい指示なしで進められます。2025年以降のAI活用の中心テーマであり、「AIに仕事を任せる」時代の入り口です。"],
      ["ツール使用（Function Calling）", "LLMが外部のツールやAPIを呼び出せる仕組みです。「東京の天気は？」と聞かれたら天気APIを呼び出す、計算が必要なら電卓を使う、というように、モデル単体の弱点を外部ツールで補完します。エージェントの実現を支える基盤技術で、検索・コード実行・データベース操作など応用は無限です。"],
      ["MCP（Model Context Protocol）", "AIと外部ツール・データソースをつなぐ共通規格として、Anthropicが2024年に公開したオープンプロトコルです。従来はツール連携を個別に開発する必要がありましたが、MCPにより「一度作れば様々なAIから使える」標準化が進みました。AIエコシステムのUSB-Cに例えられ、業界全体で採用が広がっています。"],
      ["業務でのAI活用例", "実務でのAI活用は、文章作成・要約・翻訳・議事録、コード生成・レビュー、データ分析・資料作成、カスタマーサポート、企画のブレインストーミングなど多岐にわたります。成功の鍵は「AIに丸投げ」ではなく、得意なタスクを見極めて人間のレビューと組み合わせることです。まず自分の業務を分解し、AIに任せられる部分を探すことから始めましょう。"]
    ]
  },
  {
    title: "第7章 AI開発の実践",
    desc: "AIを「作る側」の知識。開発ツールやライブラリ、開発の流れを学びます。",
    topics: [
      ["PythonとAI開発", "AI開発の標準言語はPythonです。文法がシンプルで学びやすく、AI関連のライブラリが圧倒的に充実しているためです。データ処理から学習、デプロイまでPythonだけで完結できます。AIエンジニアを目指すなら最初に習得すべき言語であり、Jupyter Notebookなどの対話的環境とともに使われます。"],
      ["主要ライブラリ（NumPy・pandas・scikit-learn）", "NumPyは高速な数値計算（行列演算）、pandasは表形式データの加工・分析、scikit-learnは古典的な機械学習アルゴリズムの実装を提供する、Python機械学習の三種の神器です。scikit-learnは統一されたシンプルなAPIで、数行のコードでモデルの学習と評価ができます。"],
      ["PyTorchとTensorFlow", "ディープラーニングの2大フレームワークです。Meta発のPyTorchは柔軟で直感的なコードが書け、研究分野では標準的な地位を確立しています。Google発のTensorFlowは本番環境へのデプロイに強みがあります。現在は研究・実務ともにPyTorchが優勢で、初学者にもPyTorchが推奨されることが多いです。"],
      ["APIでLLMを使う", "自前でLLMを訓練しなくても、OpenAI・Anthropic・GoogleなどのAPIを呼び出せば数行のコードで最先端モデルを利用できます。料金は処理したトークン数に応じた従量課金です。プロンプトの設計、ストリーミング、構造化出力、エラー処理などが実装のポイントで、現代のAIアプリ開発の最も一般的な形態です。"],
      ["データ前処理", "実務の機械学習では、作業時間の大半をデータ前処理が占めると言われます。欠損値の補完、外れ値の処理、表記ゆれの統一、カテゴリ変数の数値化、スケーリングなど、生データをモデルが学習できる形に整える地道な工程です。前処理の質がモデルの性能を直接左右するため、最も重要な工程の一つです。"],
      ["モデル開発の流れ", "機械学習プロジェクトは、①課題定義、②データ収集、③前処理・探索的分析、④モデル選択と学習、⑤評価、⑥改善の繰り返し、⑦デプロイ、という流れで進みます。重要なのは「精度の高いモデル」ではなく「ビジネス課題を解決すること」が目的だと忘れないことです。シンプルな手法から始めて段階的に高度化するのが定石です。"],
      ["Hugging Faceとオープンモデル", "Hugging Faceは「AIのGitHub」と呼ばれるプラットフォームで、数十万の学習済みモデルやデータセットが公開されています。transformersライブラリを使えば、数行のコードで最先端モデルをダウンロードして利用できます。LlamaやMistralなどのオープンモデルの普及により、誰でも高性能AIを手元で動かせる時代になりました。"],
      ["ローカルLLM", "クラウドAPIではなく、自分のPCやサーバー上でLLMを動かす方法です。OllamaやLM Studioなどのツールを使えば手軽に始められます。データを外部に送信しないためセキュリティ・プライバシー面で有利で、API料金もかかりません。性能は最先端のクラウドモデルに劣るものの、小型モデルの高性能化で実用域に達しています。"],
      ["ファインチューニングの実践", "既存のモデルを自分のデータで追加学習させ、特定の用途に特化させる技術です。全パラメータを更新する方法は膨大な計算資源が必要ですが、LoRAなどの「一部だけを効率的に学習する手法（PEFT）」により、個人のGPUでも実行可能になりました。ただし多くの用途では、まずRAGやプロンプト改善で済むか検討するのが先決です。"],
      ["MLOps — AIの運用", "モデルは作って終わりではなく、本番環境で動かし続ける運用が必要です。MLOpsとは、モデルのバージョン管理、自動再学習、性能監視、デプロイの自動化など、機械学習の開発と運用を効率化する実践手法です。データの傾向が変わってモデルの精度が劣化する「ドリフト」への対応など、運用ならではの課題があります。"]
    ]
  },
  {
    title: "第8章 AIの倫理と社会",
    desc: "AIを正しく使うために。リスク・倫理・法規制の知識は全員の必修科目です。",
    topics: [
      ["AI倫理とは", "AIの開発・利用において守るべき価値観や原則を扱う分野です。公平性、透明性、プライバシー、安全性、人間の尊厳の尊重などが主要テーマです。AIが社会の重要な意思決定（採用・融資・医療など）に関わるようになった今、技術者だけでなく利用者全員に求められる素養となっています。"],
      ["バイアスと公平性", "AIは学習データに含まれる偏見をそのまま学習し、増幅することがあります。過去の採用データから女性を不当に低評価するAI、特定の人種で精度が落ちる顔認識などの実例が報告されています。データの偏りの検証や公平性の評価は、AI開発における重要な責務です。"],
      ["プライバシーと個人情報", "AIの学習や利用には大量のデータが使われるため、個人情報保護との緊張関係が生じます。チャットAIに入力した内容が学習に使われる可能性、顔認識による監視社会化などが論点です。業務利用では、機密情報や個人情報を入力してよいか、サービスの規約と社内ルールの確認が必須です。"],
      ["ディープフェイクと偽情報", "生成AIで作られた本物そっくりの偽動画・偽音声・偽画像をディープフェイクと呼びます。詐欺、なりすまし、世論操作などへの悪用が世界的な問題になっています。「見たもの・聞いたものが本物とは限らない」時代となり、情報の出所を確認するリテラシーと、コンテンツの来歴を証明する技術（電子透かしなど）の両方が重要になっています。"],
      ["透明性と説明可能性（XAI）", "ディープラーニングは判断の根拠が人間に分かりにくい「ブラックボックス」だと言われます。説明可能AI（XAI）は、AIがなぜその判断をしたのかを人間が理解できるようにする技術・取り組みです。融資審査や医療診断など、判断の理由説明が求められる分野では特に重要です。"],
      ["AI規制の動向", "世界各国でAIの法規制が進んでいます。EUの「AI法（AI Act）」は世界初の包括的AI規制で、リスクの高さに応じて義務を課す方式です。日本はガイドライン中心のソフトロー路線、米国は州・分野ごとの規制が中心です。AIを事業で使う場合、提供地域の規制の把握が必要になりつつあります。"],

const content = document.getElementById("content");
const toc = document.getElementById("toc");
const STORAGE_KEY = "ai100-progress";
let progress = {};
try { progress = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch (e) { progress = {}; }

let num = 0;
CHAPTERS.forEach((ch, ci) => {
  const start = num + 1;
  const section = document.createElement("section");
  section.className = "chapter";
  section.id = "ch" + (ci + 1);

  const head = document.createElement("div");
  head.className = "chapter-head";
  head.innerHTML = `<h2>${ch.title}</h2><span class="chapter-range">${start}〜${start + ch.topics.length - 1}</span>`;
  section.appendChild(head);

  const desc = document.createElement("p");
  desc.className = "chapter-desc";
  desc.textContent = ch.desc;
  section.appendChild(desc);

  ch.topics.forEach(([title, body]) => {
    num++;
    const n = num;
    const div = document.createElement("div");
    div.className = "topic" + (progress[n] ? " done" : "");
    div.dataset.n = n;
    div.innerHTML = `
      <div class="topic-head">
        <div class="topic-num">${n}</div>
        <div class="topic-title">${title}</div>
        <input type="checkbox" class="topic-check" ${progress[n] ? "checked" : ""} title="読んだらチェック">
      </div>
      <div class="topic-body">${body}</div>`;
    div.querySelector(".topic-check").addEventListener("change", (e) => {
      progress[n] = e.target.checked;
      if (!e.target.checked) delete progress[n];
      localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
      div.classList.toggle("done", e.target.checked);
      updateProgress();
    });
    section.appendChild(div);
  });

  content.appendChild(section);

  const link = document.createElement("a");
  link.href = "#ch" + (ci + 1);
  link.innerHTML = `${ch.title} <span class="toc-count">${start}〜${start + ch.topics.length - 1}</span>`;
  toc.appendChild(link);
});

function updateProgress() {
  const done = Object.keys(progress).length;
  document.getElementById("progressBar").style.width = done + "%";
  document.getElementById("progressLabel").textContent = `${done} / 100 完了` + (done === 100 ? " 🎉 全項目マスター！" : "");
}
updateProgress();

document.getElementById("searchBox").addEventListener("input", (e) => {
  const q = e.target.value.trim().toLowerCase();
  document.querySelectorAll(".topic").forEach((t) => {
    t.style.display = !q || t.textContent.toLowerCase().includes(q) ? "" : "none";
  });
  document.querySelectorAll("section.chapter").forEach((s) => {
    const visible = [...s.querySelectorAll(".topic")].some((t) => t.style.display !== "none");
    s.style.display = visible ? "" : "none";
  });
});

document.getElementById("resetBtn").addEventListener("click", () => {
  if (!confirm("学習進捗をすべてリセットしますか？")) return;
  progress = {};
  localStorage.removeItem(STORAGE_KEY);
  document.querySelectorAll(".topic").forEach((t) => t.classList.remove("done"));
  document.querySelectorAll(".topic-check").forEach((c) => (c.checked = false));
  updateProgress();
});
</script>
